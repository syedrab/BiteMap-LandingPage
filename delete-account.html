<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account - BiteMap</title>

    <meta name="description" content="Request to delete your BiteMap account and all associated data.">
    <link rel="canonical" href="https://www.bitemap.fun/delete-account">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.bitemap.fun/delete-account">
    <meta property="og:title" content="Delete Account - BiteMap">
    <meta property="og:description" content="Request to delete your BiteMap account and all associated data.">
    <meta property="og:image" content="https://www.bitemap.fun/images/og-image.jpg">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.bitemap.fun/delete-account">
    <meta property="twitter:title" content="Delete Account - BiteMap">
    <meta property="twitter:description" content="Request to delete your BiteMap account and all associated data.">
    <meta property="twitter:image" content="https://www.bitemap.fun/images/og-image.jpg">

    <link rel="icon" type="image/png" href="/images/bitemap-logo.png">
    <link rel="apple-touch-icon" href="/images/bitemap-logo.png">
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff;
            color: #1a1a1a;
        }

        a.logo { text-decoration: none; }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #f0f0f0;
        }

        .logo { color: #1a1a1a; }
        .nav-links a { color: #1a1a1a; }
        .nav-links a:hover { opacity: 0.6; }

        .footer {
            background: #fff;
            border-top: 1px solid #f0f0f0;
        }

        .footer-logo { color: #1a1a1a; }
        .footer-links a { color: #888; }
        .footer-links a:hover { color: #FF6B35; }
        .footer-copy { color: #888; }

        .delete-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 140px 20px 100px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .delete-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .delete-header h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            color: #1a1a1a;
        }

        .delete-intro {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.6;
        }

        .delete-card {
            background: #f8f8f8;
            border: 1.5px solid #e5e5e5;
            border-radius: 20px;
            padding: 2.5rem;
            transition: border-color 0.3s ease;
        }

        .delete-card:hover {
            border-color: #ccc;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            background: #fff;
            color: #1a1a1a;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #FF6B35;
        }

        .submit-button {
            background: #FF6B35;
            color: #fff;
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            font-family: inherit;
        }

        .submit-button:hover {
            background: #e55a2b;
            transform: translateY(-2px);
        }

        .submit-button:disabled {
            background: #ccc;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }

        .form-message {
            margin-top: 1.5rem;
            padding: 1rem 1.25rem;
            border-radius: 10px;
            display: none;
            font-size: 0.95rem;
        }

        .form-message.success {
            background: #e7f7ef;
            color: #00984a;
            border: 1px solid #00D26A;
        }

        .form-message.error {
            background: #ffe7e7;
            color: #d32f2f;
            border: 1px solid #ff5252;
        }

        .delete-note {
            margin-top: 2rem;
            text-align: center;
            color: #888;
            font-size: 0.875rem;
            line-height: 1.6;
        }

        .delete-note a {
            color: #FF6B35;
            text-decoration: none;
        }

        .delete-note a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .delete-container {
                padding: 100px 16px 60px;
            }

            .delete-card {
                padding: 1.5rem;
                border-radius: 16px;
            }

            .form-group input {
                padding: 0.75rem 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="/" class="logo">
                <img src="/images/bitemap-logo.png" alt="BiteMap" class="logo-icon">
                <span>BiteMap</span>
            </a>
            <div class="nav-links">
                <a href="/support">Support</a>
                <a href="/blog/">Blog</a>
                <a href="https://apps.apple.com/ca/app/bitemap/id6746139076" class="download-btn" target="_blank" rel="noopener">Download App</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="delete-container">
            <div class="delete-header">
                <h1>Delete Account</h1>
                <p class="delete-intro">Enter the email associated with your BiteMap account to request deletion. All your data will be permanently removed.</p>
            </div>

            <div class="delete-card">
                <form id="deleteForm">
                    <div class="form-group">
                        <label for="email">Account Email</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>

                    <button type="submit" class="submit-button" id="submitBtn">Request Account Deletion</button>

                    <div class="form-message" id="formMessage"></div>
                </form>
            </div>

            <p class="delete-note">
                Need help? Contact us at <a href="mailto:support@bitemap.fun">support@bitemap.fun</a>
            </p>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">BiteMap</div>
            <div class="footer-links">
                <a href="/privacy.html">Privacy</a>
                <a href="/terms.html">Terms</a>
                <a href="/support.html">Support</a>
            </div>
            <p class="footer-copy">&copy; 2026 BiteMap</p>
        </div>
    </footer>

    <script>
        document.getElementById('deleteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const formMessage = document.getElementById('formMessage');
            const email = document.getElementById('email').value.trim();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            formMessage.style.display = 'none';

            try {
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        subject: 'Account Deletion Request',
                        message: 'User has requested account deletion for: ' + email
                    })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    formMessage.className = 'form-message success';
                    formMessage.textContent = 'Your deletion request has been submitted. We will process it within 48 hours.';
                    formMessage.style.display = 'block';
                    document.getElementById('deleteForm').reset();
                } else {
                    formMessage.className = 'form-message error';
                    formMessage.textContent = data.error || 'Something went wrong. Please try again.';
                    formMessage.style.display = 'block';
                }
            } catch (error) {
                formMessage.className = 'form-message error';
                formMessage.textContent = 'Network error. Please email support@bitemap.fun to request deletion.';
                formMessage.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Request Account Deletion';
            }
        });
    </script>
</body>
</html>
