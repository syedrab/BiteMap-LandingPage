<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account - BiteMap</title>

    <meta name="description" content="Request to delete your BiteMap account and all associated data.">
    <link rel="canonical" href="https://www.bitemap.fun/delete-account">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.bitemap.fun/delete-account">
    <meta property="og:title" content="Delete Account - BiteMap">
    <meta property="og:description" content="Request to delete your BiteMap account and all associated data.">

    <link rel="icon" type="image/x-icon" href="/images/bitemap.jpeg">
    <link rel="apple-touch-icon" href="/images/bitemap.jpeg">
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #ffffff; }
        a.logo { text-decoration: none; }

        .delete-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 120px 20px 80px;
            line-height: 1.8;
        }

        .delete-container h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #000;
        }

        .delete-intro {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 40px;
        }

        .delete-form {
            background: #f8f8f8;
            padding: 30px;
            border-radius: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #FF6B6B;
        }

        .submit-button {
            background: #FF6B6B;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .submit-button:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        .submit-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .form-message {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            display: none;
        }

        .form-message.success {
            background: #e7f7ef;
            color: #00984a;
            border: 1px solid #00D26A;
        }

        .form-message.error {
            background: #ffe7e7;
            color: #d32f2f;
            border: 1px solid #ff5252;
        }

        @media (max-width: 768px) {
            .delete-container h1 { font-size: 2rem; }
            .delete-form { padding: 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="/" class="logo">
                <img src="/images/bitemap.jpeg" alt="BiteMap" class="logo-icon">
                <span>BiteMap</span>
            </a>
            <div class="nav-links">
                <a href="/#features">Features</a>
                <a href="/#preview">Preview</a>
                <a href="/blog/">Blog</a>
                <a href="/#download" class="download-btn">Get Early Access</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="delete-container">
            <h1>Delete Account</h1>
            <p class="delete-intro">Enter the email address associated with your BiteMap account to request deletion. We will process your request and remove all your data.</p>

            <form class="delete-form" id="deleteForm">
                <div class="form-group">
                    <label for="email">Account Email *</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <button type="submit" class="submit-button" id="submitBtn">Request Account Deletion</button>

                <div class="form-message" id="formMessage"></div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">BiteMap</div>
            <div class="footer-links">
                <a href="/privacy.html">Privacy</a>
                <a href="/terms.html">Terms</a>
                <a href="/support.html">Support</a>
            </div>
            <p class="footer-copy">&copy; 2024 BiteMap</p>
        </div>
    </footer>

    <script>
        document.getElementById('deleteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const formMessage = document.getElementById('formMessage');
            const email = document.getElementById('email').value.trim();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            formMessage.style.display = 'none';

            try {
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        subject: 'Account Deletion Request',
                        message: 'User has requested account deletion for: ' + email
                    })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    formMessage.className = 'form-message success';
                    formMessage.textContent = 'Your deletion request has been submitted. We will process it within 48 hours.';
                    formMessage.style.display = 'block';
                    document.getElementById('deleteForm').reset();
                } else {
                    formMessage.className = 'form-message error';
                    formMessage.textContent = data.error || 'Something went wrong. Please try again.';
                    formMessage.style.display = 'block';
                }
            } catch (error) {
                formMessage.className = 'form-message error';
                formMessage.textContent = 'Network error. Please email support@bitemap.fun to request deletion.';
                formMessage.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Request Account Deletion';
            }
        });
    </script>
</body>
</html>
