<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1024px;
            height: 500px;
            overflow: hidden;
            font-family: 'Space Grotesk', -apple-system, sans-serif;
        }

        .banner {
            width: 1024px;
            height: 500px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle grid lines like the Toronto street grid */
        .grid-line {
            position: absolute;
            opacity: 0.06;
        }
        .grid-line.h { height: 0; left: 0; right: 0; border-top: 1px dashed #666; }
        .grid-line.v { width: 0; top: 0; bottom: 0; border-left: 1px dashed #666; }
        .g1 { top: 20%; }
        .g2 { top: 45%; }
        .g3 { top: 70%; }
        .g4 { left: 15%; }
        .g5 { left: 40%; }
        .g6 { left: 65%; }
        .g7 { left: 85%; }

        .content {
            display: flex;
            align-items: center;
            gap: 70px;
            z-index: 2;
            padding: 0 80px;
        }

        .text-side {
            flex: 1;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            overflow: hidden;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-text {
            font-family: 'Baloo 2', cursive;
            font-size: 52px;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1;
        }

        .tagline {
            font-family: 'Baloo 2', sans-serif;
            font-size: 30px;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1.15;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            color: #666;
            margin-top: 16px;
            line-height: 1.5;
        }

        .phone-side {
            flex-shrink: 0;
        }

        .phone {
            width: 195px;
            aspect-ratio: 9 / 19.5;
            background: #000;
            border-radius: 34px;
            padding: 8px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.18);
            transform: rotate(6deg);
        }

        .phone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 26px;
        }

        /* Subtle food emojis */
        .emoji {
            position: absolute;
            opacity: 0.12;
            z-index: 1;
        }
        .e1 { top: 30px; left: 30px; font-size: 32px; transform: rotate(-15deg); }
        .e2 { bottom: 30px; right: 40px; font-size: 32px; transform: rotate(20deg); }
        .e3 { top: 50px; right: 320px; font-size: 24px; transform: rotate(10deg); }
        .e4 { bottom: 60px; left: 100px; font-size: 26px; transform: rotate(-10deg); }
        .e5 { top: 220px; left: 15px; font-size: 22px; transform: rotate(25deg); }
        .e6 { bottom: 30px; left: 350px; font-size: 20px; transform: rotate(-20deg); }
    </style>
</head>
<body>
    <div class="banner">
        <!-- Subtle grid -->
        <div class="grid-line h g1"></div>
        <div class="grid-line h g2"></div>
        <div class="grid-line h g3"></div>
        <div class="grid-line v g4"></div>
        <div class="grid-line v g5"></div>
        <div class="grid-line v g6"></div>
        <div class="grid-line v g7"></div>

        <span class="emoji e1">🍕</span>
        <span class="emoji e2">🌮</span>
        <span class="emoji e3">🍜</span>
        <span class="emoji e4">🍔</span>
        <span class="emoji e5">🍣</span>
        <span class="emoji e6">🧁</span>

        <div class="content">
            <div class="text-side">
                <div class="logo-row">
                    <div class="logo-icon">
                        <img src="/images/bitemap-logo.png" alt="BiteMap">
                    </div>
                    <div class="logo-text">BiteMap</div>
                </div>
                <div class="tagline">Real Food, Real Reviews.<br>Find Your Next Bite.</div>
                <div class="subtitle">Discover restaurants through short video reviews<br>from local food creators.</div>
            </div>
            <div class="phone-side">
                <div class="phone">
                    <img src="/images/Home Feed.png" alt="BiteMap App">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
